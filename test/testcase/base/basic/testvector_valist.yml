testvector:
  - example: valist (simple)
    schema: VALIST
    args:
      - type: float
        value: 3.141592
      - type: string
        value: phi
      - type: int
        value: 123
    items:
      - item: item1
        format: value={1} value={2} value={3}
        expect: value=3.141592 value=phi value=123
      - item: item2
        format: value={2} value={3} value={1}
        expect: value=phi value=123 value=3.141592
      - item: item3
        format: value={3} value={2} value={1}
        expect: value=123 value=phi value=3.141592
      - item: item4
        format: value={2} value={1} value={3}
        expect: value=phi value=3.141592 value=123
      - item: item5
        format: value={2} value={1} value={3} value={2}
        expect: value=phi value=3.141592 value=123 value=phi
      - item: item6
        format: value={3} value={2} value={2} value={1} value={4} value={5}
        expect: value=123 value=phi value=phi value=3.141592 value={4} value={5}
  - example: valist (format string syntax)
    schema: VALIST
    args:
      - type: int
        value: 256
      - type: string
        value: hello world
      - type: float
        value: 3.141592
    items:
      - item: item1
        format: value={1}, value={1:04x}, value={1:04d}
        expect: value=256, value=0x0100, value=0256
      - item: item2
        format: value="{2}", value="{2:-15s}", value="{2:15s}"
        expect: value="hello world", value="hello world    ", value="    hello world"
      - item: item3
        format: value={3}, value={3:le}, value={3:lg}
        expect: value=3.141592, value=3.141592e+00, value=3.14159
      - item: item4
        format: value={-1}, value="{2:10d}", value={3:s}
        # {n} n must be in 1..arg so {-1} is ignored
        # {2} is a string so 10d is ignored
        # {3} is an integer so s is ignored.
        expect: value={-1}, value="hello world", value=3.141592
